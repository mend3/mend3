fundamente com arquitetura pragmática, fundações de dados limpas e fazer a IA ser genuinamente útil em produção — e adoro trocar ideias com quem está construindo nesse mesmo espaço.","en":"Hi, I'm Victor — a software engineer and platform architect. I've spent 15+ years building and operating scalable SaaS, distributed systems, data-intensive applications, and AI-powered products across fintech, legaltech, e-commerce intelligence, and analytics. What I enjoy most is turning fragmented data, processes, and knowledge into systems that actually run a business — multi-tenant SaaS, integration ecosystems, workflow automation, large-scale data acquisition, AI-native products, and knowledge systems. Right now I'm leading the architecture of an AI-data-driven SaaS ecosystem on a unified multi-tenant platform, while contributing to enterprise e-commerce intelligence analytics. I care deeply about pragmatic architecture, clean data foundations, and making AI genuinely useful in production — and I'm always happy to trade ideas with people building in the same space.","es":"Hola, soy Victor — ingeniero de software y arquitecto de plataforma. Llevo más de 15 años construyendo y operando SaaS escalable, sistemas distribuidos, aplicaciones data-intensive y productos con IA en fintech, legaltech, inteligencia de e-commerce y analytics. Lo que más disfruto es convertir datos, procesos y conocimiento fragmentados en sistemas que realmente operan un negocio — SaaS multi-tenant, ecosistemas de integración, automatización de workflows, adquisición de datos a gran escala, productos AI-native y sistemas de conocimiento. Hoy lidero la arquitectura de un ecosistema SaaS AI-data-driven sobre una plataforma multi-tenant unificada, mientras contribuyo con analytics de inteligencia de e-commerce enterprise. Me importa profundamente la arquitectura pragmática, las bases de datos limpias y hacer que la IA sea genuinamente útil en producción — y siempre disfruto intercambiar ideas con quienes construyen en el mismo espacio."},"note":{"pt":"Este é o workspace que estou construindo agora — os projetos mapeados acima.","en":"This is the workspace I'm building right now — the projects mapped above.","es":"Este es el workspace que estoy construyendo ahora mismo — los proyectos mapeados arriba."},"expertise":[{"pt":"Arquitetura de Plataforma","en":"Platform Architecture","es":"Arquitectura de Plataforma"},{"pt":"SaaS Multi-Tenant","en":"Multi-Tenant SaaS","es":"SaaS Multi-Tenant"},{"pt":"Sistemas Distribuídos","en":"Distributed Systems","es":"Sistemas Distribuidos"},{"pt":"Plataformas de Dados","en":"Data Platforms","es":"Plataformas de Datos"},{"pt":"Ecossistemas de Integração","en":"Integration Ecosystems","es":"Ecosistemas de Integración"},{"pt":"Automação de Workflows","en":"Workflow Automation","es":"Automatización de Workflows"},{"pt":"Aplicações de IA & LLM","en":"AI & LLM Applications","es":"Aplicaciones de IA & LLM"},{"pt":"Sistemas Agênticos","en":"Agentic Systems","es":"Sistemas Agénticos"},{"pt":"RAG & Sistemas de Conhecimento","en":"RAG & Knowledge Systems","es":"RAG & Sistemas de Conocimiento"},{"pt":"Arquitetura Orientada a Eventos","en":"Event-Driven Architecture","es":"Arquitectura Orientada a Eventos"},{"pt":"Observabilidade & Confiabilidade","en":"Observability & Reliability","es":"Observabilidad & Confiabilidad"},{"pt":"Liderança de Engenharia","en":"Engineering Leadership","es":"Liderazgo de Ingeniería"}],"experience":[{"role":{"pt":"Fundador & Arquiteto de Plataforma","en":"Founder & Platform Architect","es":"Fundador & Arquitecto de Plataforma"},"org":"DevShell Tech","period":{"pt":"2023 – Atual","en":"2023 – Present","es":"2023 – Actualidad"},"current":true,"summary":{"pt":"Arquiteto e opero um ecossistema SaaS multi-tenant onde uma fundação compartilhada sustenta muitos produtos — control plane, framework de conectores, aquisição de dados em larga escala, automação de workflows, camada de IA e apps verticais (finanças/Open Finance, projeto igning, building, and operating the platforms that companies run on — multi-tenant SaaS, distributed systems, large-scale data acquisition, and AI-native products.","One thread connects the work across <b>fintech, legaltech, retail &amp; commerce intelligence, and data-intensive platforms</b>: taking fragmented data, integrations, and processes and turning them into <b>operational intelligence</b> — systems a business operates on, not dashboards it looks at. I did it consolidating millions of pricing signals for global brands; I'm doing it now in DevShell Tech, where many products share one foundation.","I operate across the full arc — <b>set the architecture and strategy, then write the code that de-risks the hardest parts</b> — and I treat structural decisions as business decisions: every one tied to cost, reliability, or speed-to-market."]},"domains":[{"k":{"pt":"SaaS multi-tenant","en":"Multi-tenant SaaS"},"v":{"pt":"Quase todo SaaS reconstrói as mesmas coisas — auth, billing, permissões, integrações. Trato isso como capacidade de plataforma, em vez de resolver de novo em cada produto.","en":"Most SaaS products rebuild the same things — auth, billing, permissions, integrations. I treat those as platform capabilities instead of re-solving them per product."}},{"k":{"pt":"Aquisição de dados em escala","en":"Data acquisition at scale"},"v":{"pt":"Fornecimento confiável de dados externos quando a web resiste — crawling distribuído, automação de navegador, gestão de proxies e anti-bot.","en":"Reliable supply of external data when the web fights back — distributed crawling, browser automation, proxy management and anti-bot."}},{"k":{"pt":"Ecossistemas de integração","en":"Integration ecosystems"},"v":{"pt":"Muitos sistemas se comportando como um só, sobre um modelo de dados canônico — sem silos que se contradizem.","en":"Many systems made to behave as one, on a single canonical data model — no more silos that disagree."}},{"k":{"pt":"Sistemas de IA e agentes","en":"AI &amp; agentic systems"},"v":{"pt":"A maioria da IA emperra porque o contexto está espalhado. O trabalho é a infraestrutura que deixa o modelo raciocinar sobre produtos, usuários, documentos e dados operacionais ao mesmo tempo.","en":"Most AI stalls because context is scattered. The work is the infrastructure that lets a model reason over products, users, documents and operational data at once."}},{"k":{"pt":"Inteligência operacional","en":"Operational intelligence"},"v":{"pt":"Sinais fragmentados convertidos em o-que-fazer-agora — preço, prateleira, performance, crescimento.","en":"Fragmented signals turned into what to do next — pricing, shelf, performance, growth."}},{"k":{"pt":"Confiabilidade e custo","en":"Reliability &amp; cost"},"v":{"pt":"Um sistema que precisa de conhecimento tribal para rodar não está pronto — observável, resiliente e mais barato de operar ao longo do tempo.","en":"A system that needs tribal knowledge to run isn't finished — observable, resilient, and cheaper to operate over time."}}],"experienceDetail":{"DevShell Tech":{"built":{"pt":"uma plataforma única em que uma fundação compartilhada sustenta muitos produtos e verticais — em vez de reconstruir infraestrutura, dados e IA a cada um.","en":"a single platform where one shared foundation powers many products and verticals — instead of rebuilding infrastructure, data, and AI for each."},"problem":{"pt":"cada novo produto ou vertical normalmente significa recriar infraestrutura, integrações e IA do zero.","en":"every new product or vertical normally means re-creating infrastructure, integrations, and AI from scratch."},"impact":{"pt":"verticais agora entram como módulos sobre uma base comum, então o custo marginal do próximo produto, cliente ou mercado é decrescente — e a IA entende a operação inteira porque tudo vive em um só modelo de dados.","en":"verticals now ship as modules on a shared base, so the marginal cost of the next product, tenant, or market keeps falling — and the AI understands the whole operation because everything lives on one data model."},"bullets":[{"pt":"<b>Control plane compartilhado</b> — uma fundação sobre a qual todo produto roda: orquestração, bancos de dados compartilhados, infraestrutura de IA, busca vetorial e observabilidade.","en":"<b>Shared control plane</b> — one foundation every product runs on: orchestration, shared databases, AI infrastructure, vector search, and observability."},{"pt":"<b>Runtime de aplicações multi-tenant</b> — a camada em que uma vertical inteira vira módulo: conectores universais, CMS/page builder, automação de processos, agendamento, recrutamento, imobiliário e dashboards. Muitos produtos, um só código.","en":"<b>Multi-tenant application runtime</b> — the layer where a whole vertical becomes a module: universal connectors, content/CMS and page building, workflow automation, scheduling, recruitment, real estate, and dashboards. Many products, one codebase."},{"pt":"<b>Camada de aquisição de dados</b> — coleta resiliente em larga escala (crawling distribuído, automação de navegadores, gestão de proxies, anti-bot) que abastece o resto da plataforma.","en":"<b>Data acquisition layer</b> — resilient, large-scale collection (distributed crawling, browser automation, proxy management, anti-bot) that supplies the rest of the platform."},{"pt":"<b>Camada nativa de IA</b> — um assistente que entende o sistema inteiro: memória persistente, recuperação de conhecimento, workflows de agentes e execução de ferramentas, com dados e inferência podendo permanecer na infraestrutura do próprio cliente.","en":"<b>Native AI layer</b> — an assistant that understands the whole system: persistent memory, knowledge retrieval, agentic workflows, and tool execution, with data and inference able to stay on the company's own infrastructure."}],"note":{"pt":"Responsável por estratégia de produto, arquitetura de software, infraestrutura, sistemas de IA, plataformas de dados e padrões de engenharia.","en":"Ownership across product strategy, software architecture, infrastructure, AI systems, data platforms, and engineering standards."},"stack":"TypeScript · Node.js · Next.js · React · PostgreSQL · Redis · Kubernetes · local LLMs (Ollama) · vector search · event-driven architecture"},"Visualitics":{"built":{"pt":"o núcleo de integração e processamento de uma plataforma de inteligência de e-commerce que consolida dados de marketplaces, publicidade e analytics em uma única camada de decisão — entregue no fluxo de trabalho via aplicações web e uma extensão de navegador.","en":"the integration and processing core of a commerce-intelligence platform that consolidates marketplace, advertising, and analytics data into a single decision layer — surfaced in-workflow through web apps and a browser extension."},"problem":{"pt":"os dados de performance de um vendedor estão espalhados por uma dezena de marketplaces e redes de anúncios que nunca concordam.","en":"a seller's performance data is scattered across a dozen marketplaces and ad networks that never agree."},"impact":{"pt":"um só lugar para ver e agir sobre a operação inteira, com o insight entregue onde o trabalho já acontece.","en":"one place to see and act on the whole operation, with insight delivered where the work already happens."},"note":{"pt":"Responsável pela ingestão de múltiplas fontes, processamento distribuído, ETL e cálculo de KPIs em Mercado Livre, Shopee, Amazon SP-API, VTEX, NuvemShop, GA4, Meta Ads e Google Ads.","en":"Owned multi-source ingestion, distributed processing, ETL, and KPI computation across Mercado Livre, Shopee, Amazon SP-API, VTEX, NuvemShop, GA4, Meta Ads, and Google Ads."},"stack":"Node.js · TypeScript · Express · Prisma · Python · FastAPI · BigQuery · Redis · GCP · browser-extension architecture"},"Jusbrasil":{"built":{"pt":"a infraestrutura de acesso web e aquisição de dados em larga escala por trás das operações de inteligência da empresa — arquitetura de proxies e roteamento para recuperação rápida e confiável em escala.","en":"the large-scale web-access and data-acquisition infrastructure behind the company's intelligence operations — proxy and routing architecture for fast, dependable retrieval at scale."},"problem":{"pt":"aquisição de dados confiável fica cara e frágil conforme o volume e a pressão anti-bot crescem.","en":"reliable data acquisition gets expensive and brittle as volume and anti-bot pressure grow."},"impact":{"pt":"redução relevante de custo operacional com maior confiabilidade — e ferramentas internas que elevaram a produtividade de todo o time.","en":"materially lower operational spend with stronger reliability — and internal tooling that lifted the whole team's throughput."},"note":{"pt":"Confiabilidade, resiliência, observabilidade e developer experience como prioridades de primeira ordem.","en":"Reliability, resiliency, observability, and developer-experience work as first-class concerns."},"stack":"Node.js · TypeScript · Docker · Kubernetes · Redis · PostgreSQL · observability platforms"},"Stone":{"built":{"pt":"serviços de backend e integrações para processamento de pagamentos e adquirência de alto volume, em uma das maiores adquirentes da América Latina.","en":"backend services and integrations for high-volume payment processing and merchant acquiring at one of Latin America's largest acquirers."},"problem":{"pt":"movimentação de dinheiro não tolera indisponibilidade, perda de dados nem falha de conformidade — em escala.","en":"money movement tolerates no downtime, no data loss, and no compliance gaps — at scale."},"impact":{"pt":"fluxos financeiros confiáveis e de baixa latência que se sustentam sob restrições rígidas de confiabilidade e regulação.","en":"dependable, low-latency financial flows that hold under strict reliability and regulatory constraints."},"note":{"pt":"Sistemas distribuídos, integrações de pagamento e bancárias, e otimização de performance sob requisitos de nível fintech.","en":"Distributed systems, payment and banking integrations, and performance optimization under fintech-grade requirements."},"stack":"Node.js · TypeScript · distributed systems · cloud infrastructure"},"Intellibrand · Ascential":{"built":{"pt":"as plataformas de inteligência de varejo e comércio que transformavam <b>milhões de sinais de preço, estoque e merchandising</b> de milhares de prateleiras digitais em decisões acionáveis para marcas de consumo globais — e cresci de escrever esse sistema a liderar o time por trás dele.","en":"the retail- and commerce-intelligence platforms that turned <b>millions of pricing, inventory, and merchandising signals</b> from thousands of digital shelves into decisions global consumer brands could act on — and grew from writing that system to leading the team behind it."},"problem":{"pt":"marcas globais não conseguiam enxergar como realmente performavam em milhares de prateleiras digitais, em canais demais para acompanhar à mão.","en":"global brands couldn't see how they were really performing across thousands of digital shelves, in too many channels to track by hand."},"impact":{"pt":"inteligência de prateleira, preço e conteúdo em tempo real, usada por marcas globais na América Latina e além — e um time de engenharia e padrões que se sustentaram conforme o volume de dados crescia. Aqui começou o fio condutor: dados fragmentados → inteligência operacional, em escala.","en":"real-time digital-shelf, pricing and content intelligence used by global brands across Latin America and beyond — and a growing engineering team and the standards that held as data volumes climbed. This is where the through-line started: fragmented data → operational intelligence, at scale."},"bullets":[{"pt":"<b>Desenvolvedor Full Stack (2019–2021)</b> — construí os pipelines de ingestão, APIs e dashboards por trás do analytics de varejo em tempo real, sobre bancos relacionais e NoSQL.","en":"<b>Full Stack Developer (2019–2021)</b> — built the ingestion pipelines, APIs and dashboards behind real-time retail analytics, across relational and NoSQL data."},{"pt":"<b>Líder Técnico (2021–2023)</b> — dono da arquitetura escalável para coleta e analytics em larga escala, inteligência de preços e prateleira digital; mentorei engenheiros e defini os padrões de entrega.","en":"<b>Technical Lead (2021–2023)</b> — owned the scalable architecture for large-scale collection and analytics, pricing intelligence and digital-shelf insight; mentored engineers and set the delivery standards."},{"pt":"<b>Gerente de Tecnologia · Ascential (2023)</b> — liderei engenharia em retail analytics, conteúdo &amp; compliance e store-locator; alinhei engenharia, produto e data science, e fui dono do roadmap técnico para marcas globais.","en":"<b>Technology Manager · Ascential (2023)</b> — led engineering across retail analytics, content &amp; compliance and store-locator tooling; aligned engineering, product and data science, and owned the technical roadmap for global brands."}],"note":{"pt":"Onde o fio condutor começou — e onde subi de IC a gestor na mesma plataforma.","en":"Where the through-line started — and where I grew from IC to manager on the same platform."},"stack":"Node.js · TypeScript · data pipelines · cloud · AI/ML · CI/CD","verb":{"pt":"Construí e liderei","en":"Built &amp; led"}}},"achievements":[{"pt":"<b>Projetei e opero o DevShell Tech de ponta a ponta</b> — control plane, aquisição de dados, framework de integração, automação de processos, camada de IA e aplicações verticais — provando que uma fundação pode sustentar muitos produtos com custo marginal decrescente.","en":"<b>I designed and operate DevShell Tech end-to-end</b> — control plane, data acquisition, integration framework, workflow automation, AI layer, and vertical apps — proving one foundation can power many products at a falling marginal cost."},{"pt":"<b>Construí plataformas de inteligência de varejo e comércio processando milhões de sinais de preço, estoque e merchandising</b> em marketplaces globais, usadas por marcas globais para guiar preço, disponibilidade e estratégia de prateleira digital.","en":"<b>I built retail &amp; commerce-intelligence platforms processing millions of pricing, inventory, and merchandising signals</b> across global marketplaces, used by global consumer brands to steer pricing, availability, and digital-shelf strategy."},{"pt":"<b>Arquitetei infraestrutura de acesso web e aquisição de dados em larga escala, eficiente em custo</b>, com confiabilidade e observabilidade como prioridades de primeira ordem — reduzindo custo operacional sem sacrificar qualidade.","en":"<b>I architected large-scale, cost-efficient web-access and data-acquisition infrastructure</b> with reliability and observability as first-class concerns — cutting operational spend without sacrificing quality."},{"pt":"<b>Entreguei sistemas financeiros e de pagamentos de alto volume</b> sob restrições rígidas de confiabilidade e conformidade, em uma das maiores adquirentes da América Latina.","en":"<b>I delivered high-volume payments and financial systems</b> under strict reliability and compliance constraints, at one of Latin America's largest acquirers."},{"pt":"<b>O fio constante em fintech, legaltech, inteligência de varejo e plataformas de dados:</b> transformar dados, integrações e processos fragmentados em inteligência operacional.","en":"<b>The consistent thread across fintech, legaltech, retail intelligence, and data platforms:</b> turning fragmented data, integrations, and processes into operational intelligence."}],"leadership":[{"pt":"<b>Propriedade de ponta a ponta</b> — defino arquitetura e estratégia técnica e, então, escrevo o código que tira o risco das partes mais difíceis. Não delego o desconhecido.","en":"<b>Full-arc ownership</b> — set architecture and technical strategy, then write the code that de-risks the hardest parts. I don't hand off the unknown."},{"pt":"<b>Engenharia multiplicadora</b> — estabeleço os padrões, a cultura de revisão e as convenções de plataforma que fazem um time pequeno entregar como um muito maior.","en":"<b>Force-multiplier engineering</b> — establish the standards, review culture, and platform conventions that let a small team ship like a much larger one."},{"pt":"<b>Fiz crescer pessoas e direção</b> — mentorei engenheiros e fui dono de roadmaps e decisões técnicas como Tech Lead e Gerente de Tecnologia.","en":"<b>Grew people and direction</b> — mentored engineers and owned roadmaps and technical decisions as Tech Lead and Technology Manager."},{"pt":"<b>Arquitetura como alavanca de negócio</b> — cada decisão estrutural ligada a um resultado concreto: menor custo, maior confiabilidade ou entrega mais rápida.","en":"<b>Architecture as a business lever</b> — every structural decision tied to a concrete outcome: lower cost, higher reliability, or faster time-to-market."}],"architecture":[{"k":{"pt":"Plataformas","en":"Platforms"},"v":{"pt":"SaaS multi-tenant · sistemas distribuídos e orientados a eventos · domain-driven design · design de sistemas","en":"multi-tenant SaaS · distributed &amp; event-driven systems · domain-driven design · system design"}},{"k":{"pt":"Dados e integração","en":"Data &amp; integration"},"v":{"pt":"frameworks de conectores · modelagem de dados canônica · ETL e pipelines analíticos · aquisição em larga escala","en":"connector frameworks · canonical data modeling · ETL &amp; analytical pipelines · large-scale acquisition"}},{"k":{"pt":"Nativo de IA","en":"AI-native"},"v":{"pt":"sistemas de agentes · geração aumentada por recuperação (RAG) · sistemas de conhecimento · busca vetorial · inferência local-first","en":"agentic systems · retrieval-augmented generation · knowledge systems · vector search · local-first inference"}},{"k":{"pt":"Operação","en":"Operations"},"v":{"pt":"confiabilidade e observabilidade · engenharia de custo · infraestrutura como control plane compartilhado","en":"reliability &amp; observability · cost engineering · infrastructure as a shared control plane"}}],"stackNote":{"pt":"Ferramentas a serviço dos sistemas acima — não o contrário.","en":"Tools in service of the systems above — not the other way around."},"languages":{"pt":"Português (nativo) · Inglês (proficiência profissional)","en":"Portuguese (native) · English (professional working proficiency)"}},"web":{"profile":{"hero":{"badge":{"en":"PRINCIPAL / STAFF ENGINEER <span class=\"sp\">&middot;</span> PLATFORM ARCHITECT","pt":"PRINCIPAL / STAFF ENGINEER <span class=\"sp\">&middot;</span> ARQUITETO DE PLATAFORMA"},"title":{"en":"I design platforms that <span class=\"sp\">reduce organizational complexity</span>.","pt":"Projeto plataformas que <span class=\"sp\">reduzem a complexidade organizacional</span>."},"sub":{"en":"The code matters — but the real goal is making systems, and the teams behind them, easier to evolve. Fifteen-plus years on the platforms other products are built on: multi-tenant SaaS, data platforms, integrations, and lately AI.","pt":"O código importa — mas o objetivo real é deixar os sistemas, e os times por trás deles, mais fáceis de evoluir. Há mais de quinze anos nas plataformas sobre as quais outros produtos são construídos: SaaS multi-tenant, plataformas de dados, integrações e, mais recentemente, IA."},"ctas":[{"label":{"en":"View Projects","pt":"Ver Projetos"},"href":"#opensource","icon":"github","primary":true},{"label":{"en":"Book a call","pt":"Agendar conversa"},"href":"https://calendly.com/mend3","icon":"calendar"}],"focus":[{"en":"Platform Architecture","pt":"Arquitetura de plataforma"},{"en":"Distributed Systems","pt":"Sistemas distribuídos"},{"en":"Multi-tenant SaaS","pt":"SaaS multi-tenant"},{"en":"AI Infrastructure","pt":"Infraestrutura de IA"},{"en":"Developer Experience","pt":"Experiência de quem desenvolve"}]},"connect":[{"label":"GitHub","href":"https://github.com/mend3","icon":"github"},{"label":"LinkedIn","href":"https://www.linkedin.com/in/vicmendonca/","icon":"linkedin"},{"label":"Google Developers","href":"https://me.   // canon(label) → id de nó, p/ linkar chips do perfil ao grafo. Preferência: technology.
  const nodeByLabel = (() => {
    const m = new Map();
    for (const n of DATA.nodes) if (n.type === "technology") m.set(canon(n.label), n.id);
    for (const n of DATA.nodes) { const k = canon(n.label); if (!m.has(k)) m.set(k, n.id); }
    return m;
  })();
  const edges = DATA.edges.filter((e) => byId.has(e.source) && byId.has(e.target));
  const adj = new Map(DATA.nodes.map((n) => [n.id, []]));
  const depAdj = new Map(DATA.nodes.map((n) => [n.id, []]));
  for (const e of edges) {
    if (e.relation === "connects") { depAdj.get(e.source).push(e.target); depAdj.get(e.target).push(e.source); continue; }
    adj.get(e.source).push({ id: e.target, rel: e.relation, dir: "out" }); adj.get(e.target).push({ id: e.source, rel: e.relation, dir: "in" });
  }
  let depsOn = store.get("kt-deps", "0") === "1";
  const color = (t) => (CATS[t] && CATS[t].color) || "#64748b";
  const bandName = (t) => (L().band[t] && L().band[t][0]) || (CATS[t] && CATS[t].label) || t;
  const bandTag = (t) => (L().band[t] && L().band[t][1]) || (CATS[t] && CATS[t].tagline) || "";
  const relName = (r) => (L().rel[r]) || r;
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  // ---- bandas ----
  const bandsEl = document.getElementById("bands");
  const pillOf = new Map();
  const headRefs = {};
  let langTitleEl = null;
  // Subtítulos i18n dos grupos de projeto (foundation/core/satellites); atualizados em renderChrome.
  const groupLabelRefs = [];
  const heroPitchRefs = [];
  const PGROUP_ORDER = ["foundation", "core", "satellites"];
  const groupName = (g) => (L().pgroup && L().pgroup[g]) || g;
  const present = ORDER.filter((t) => DATA.nodes.some((n) => n.type === t)).concat(Object.keys(CATS).filter((t) => !ORDER.includes(t) && DATA.nodes.some((n) => n.type === t)));
  for (const type of present) {
    const c = color(type), items = DATA.nodes.filter((n) => n.type === type);
    const band = document.createElement("section"); band.className = "band" + (type === "library" ? " libband" : "");
    const head = document.createElement("div"); head.className = "band-head";
    head.innerHTML = `<span class="dot" style="color:${c};background:${c}"></span><span class="name" style="color:${c}"></span><span class="tag"></span><span class="n">${items.length}</span>`;
    headRefs[type] = { name: head.querySelector(".name"), tag: head.querySelector(".tag") };
    band.appendChild(head);
    const makePill = (n) => {
      const p = document.createElement("button"); p.className = "pill" + (type === "library" ? " lib" : ""); p.style.setProperty("--c", c); p.dataset.id = n.id;
      if (n.meta && n.meta.monorepo === "nx") p.innerHTML = `${esc(n.label)} <span class="nxb" title="Nx monorepo">Nx</span>`;
      else p.textContent = n.label;
      p.addEventListener("click", (ev) => { ev.stopPropagation(); select(n.id === selected ? null : n.id); });
      pillOf.set(n.id, p); return p;
    };
    // Banda de projetos: agrupa por papel (foundation/core/satellites) com subtítulo; demais bandas ficam flat.
    if (type === "project" && items.some((n) => n.meta && n.meta.group)) {
      const groups = new Map();
      for (const n of items) { const g = (n.meta && n.meta.group) || "_"; (groups.get(g) || groups.set(g, []).get(g)).push(n); }
      const keys = [...groups.keys()].sort((a, b) => { const ia = PGROUP_ORDER.indexOf(a), ib = PGROUP_ORDER.indexOf(b); return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib); });
      for (const g of keys) {
        const sub = document.createElement("div"); sub.className = "subgroup";
        const lbl = document.createElement("div"); lbl.className = "subgroup-label"; lbl.textContent = groupName(g);
        groupLabelRefs.push({ el: lbl, key: g });
        sub.appendChild(lbl);
        const pills = document.createElement("div"); pills.className = "pills";
        for (const n of groups.get(g)) pills.appendChild(makePill(n));
        sub.appendChild(pills); band.appendChild(sub);
      }
    } else {
      const pills = document.createElement("div"); pills.className = "pills";
      for (const n of items) pills.appendChild(makePill(n));
      band.appendChild(pills);
    }
    if (type === "library") { const h = document.createElement("div"); h.className = "lib-hint"; band.appendChild(h); headRefs[type].hint = h; }
    if (type === "project" && Array.isArray(DATA.languages) && DATA.languages.length) {
      const wrap = document.createElement("div"); wrap.className = "langs";
      const ttl = document.createElement("div"); ttl.className = "langs-title"; langTitleEl = ttl; wrap.appendChild(ttl);
      const bar = document.createElement("div"); bar.className = "langbar";
      for (const l of DATA.languages) { const s = document.createElement("span"); s.className = "langseg"; s.style.width = l.pct + "%"; s.style.background = l.color; s.title = `${l.name} ${l.pct}%`; bar.appendChild(s); }
      wrap.appendChild(bar);
      const leg = document.createElement("div"); leg.className = "langleg";
      for (const l of DATA.languages) { const it = document.createElement("span"); it.className = "langitem"; it.innerHTML = `<span class="langdot" style="background:${l.color}"></span>${esc(l.name)} <b>${l.pct}%</b>`; leg.appendChild(it); }
      wrap.appendChild(leg); band.appendChild(wrap);
    }
    bandsEl.appendChild(band);
  }

  // ---- hero: catálogo de repositórios ----
  (function buildHero() {
    const hero = document.getElementById("hero");
    const projects = DATA.nodes.filter((n) => n.type === "project");
    if (!projects.length) return;
    const h2 = document.createElement("h2"); h2.id = "hero-title"; hero.appendChild(h2);
    const grid = document.createElement("div"); grid.className = "repos";
    const gitIcon = '<svg viewBox="0 0 24 24" fill="none"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="7" r="2.5"/><path d="M6 8.5v7M18 9.5a8 8 0 0 1-8 8"/></svg>';
    for (const p of projects) {
      const m = p.meta || {};
      const card = document.createElement("div"); card.className = "repo"; card.dataset.id = p.id;
      let html = `<div class="rn"><span class="dot"></span>${esc(p.label)}${m.monorepo === "nx" ? ' <span class="nxb">Nx</span>' : ""}</div>`;
      const psrc = m.pitch || m.summary || m.description || "";
      if (psrc) html += `<div class="rp">${esc(tr(psrc))}</div>`;
      if (m.remote) html += `<a class="rl" href="${esc(m.remote)}" target="_blank" rel="noopener">${gitIcon}${esc(m.repo || m.remote)}</a>`;
      card.innerHTML = html; grid.appendChild(card);
      const rp = card.querySelector(".rp"); if (rp) heroPitchRefs.push({ el: rp, src: psrc });
    }
    hero.appendChild(grid);
  })();

  // ---- perfil (seção "Sobre", data-driven via DATA.author) ----
  function renderProfile() {
    const el = document.getElementById("profile"); if (!el) return;
    const a = DATA.author;
    if (!a) { el.style.display = "none"; return; }
    const lb = L().profile || { experience: "Experience", skills: "Skills", openTo: "Open to" };
    const chips = (arr, cls) => `<div class="chips">${(arr || []).map((item) => { const label = tr(item); const key = (item && typeof item === "object") ? (item.en || label) : item; const id = nodeByLabel.get(canon(key)); return `<span class="chip${cls ? " " + cls : ""}${id ? " link" : ""}"${id ? ` data-id="${esc(id)}" title="${esc(label)}"` : ""}>${esc(label)}</span>`; }).join("")}</div>`;
    const linkIcon = (u) => /github\.com/i.test(u) ? ICON.gh : /linkedin\.com/i.test(u) ? ICON.li : ICON.link;
    let h = `<div class="prof-top"><span class="prof-name">${esc(a.name)}</span>`;
    if (a.headline) h += `<span class="prof-headline">${esc(tr(a.headline))}</span>`;
    if (a.location) h += `<span class="prof-loc">${esc(tr(a.location))}</span>`;
    if (Array.isArray(a.links) && a.links.length) h += `<span class="prof-links">${a.links.map((l) => `<a href="${esc(l.url)}" target="_blank" rel="noopener">${linkIcon(l.url)}${esc(l.label || l.url)}</a>`).join("")}</span>`;
    h += `</div>`;
    if (a.summary) h += `<div class="prof-sum">${esc(tr(a.summary))}</div>`;
    if (a.expertise && a.expertise.length) h += chips(a.expertise, "accent");
    h += `<div class="prof-cols">`;
    if (a.experience && a.experience.length) {
      h += `<div class="prof-grp"><h4>${esc(lb.experience)}</h4><div class="exp">`;
      for (const e of a.experience) h += `<div class="exp-item${e.current ? " cur" : ""}"><div class="exp-h"><span class="exp-role">${esc(tr(e.role))}</span><span class="exp-org">— ${esc(tr(e.org))}</span><span class="exp-period">${esc(tr(e.period))}</span></div>${e.summary ? `<div class="exp-desc">${esc(tr(e.summary))}</div>` : ""}</div>`;
      h += `</div></div>`;
    }
    let right = "";
    if (Array.isArray(a.skills)) for (const grp of a.skills) right += `<div class="skillgrp"><h5>${esc(tr(grp.group))}</h5>${chips(grp.items)}</div>`;
    if (a.openTo && a.openTo.length) right += `<div class="skillgrp"><h5>${esc(lb.openTo)}</h5>${chips(a.openTo, "accent")}</div>`;
    if (right) h += `<div class="prof-grp"><h4>${esc(lb.skills)}</h4>${right}</div>`;
    h += `</div>`;
    el.innerHTML = h; el.style.display = "";
  }

  // ---- chrome: brand subtitle, skip link, nav, section titles (i18n) ----
  function renderHub() {
    const a = DATA.author || {}, H = L().hub || {};
    const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
    set("brand-sub", H.brandSub || tr(a.headline) || "");
    set("skip-link", H.skip || "Skip to content");
    const nav = document.getElementById("nav");
    if (nav) nav.innerHTML = (H.nav ? [["architecture", H.nav.architecture], ["work", H.nav.work]] : []).map(([id, lbl]) => `<a href="#${id}">${esc(lbl)}</a>`).join("");
    set("arch-title", `${L().t.a} ${L().t.b}`);
    set("arch-sub", L().sub);
  }

  // ---- edges ----
  const svg = document.getElementById("edges"), stage = document.getElementById("stage");
  function centerOf(el) { const r = el.getBoundingClientRect(), s = stage.getBoundingClientRect(); return { x: r.left + r.width / 2 - s.left, y: r.top + r.height / 2 - s.top }; }
  const TERMINAL = new Set(["service", "library", "technology", "doc"]);
  /**
   * Relações de CONHECIMENTO (stack/docs): NÃO são arestas arquiteturais. Atravessá-las funde
   * o grafo num componente único — toda stack compartilhada (React/Node/Postgres) vira ponte
   * entre projetos sem relação. O destaque ao clicar as ignora.
   */
  /**
   * Arestas LATERAIS (dependência entre pares): NÃO descem na hierarquia. Um projeto alcançado
   * por `depends`/`connects` não é "aberto" (senão clicar num produto puxaria todos os serviços
   * do `oracle` do qual ele depende — o que fazia o `oracle` virar super-hub e iluminar a
   * plataforma toda). Só projetos alcançados PELA hierarquia (serves/contains a partir de
   * domínio/produto) revelam o próprio fluxo.
   */
  const LATERAL_REL = new Set(["depends", "connects"]);
  /**
   * Conjunto em destaque ao clicar: o nó + seus vizinhos DIRETOS (todas as relações — inclui as
   * tecnologias que ele usa) e, se for estrutural, o fluxo de SAÍDA dos PROJETOS alcançados PELA
   * HIERARQUIA. Tecnologias/serviços são terminais e nunca expandem, então a stack compartilhada
   * não vira ponte entre projetos. Terminal clicado mostra só relações diretas — ex.: clicar
   * numa tecnologia revela quem a usa.
   */
  function reachableFrom(id) {
    const node = byId.get(id), set = new Set([id]);
    for (const x of adj.get(id)) set.add(x.id);
    if (!TERMINAL.has(node.type)) for (const x of adj.get(id)) if (byId.get(x.id).type === "project" && !LATERAL_REL.has(x.rel)) for (const y of adj.get(x.id)) if (y.dir === "out") set.add(y.id);
    if (depsOn) for (const nid of [...set]) for (const dn of depAdj.get(nid) || []) set.add(dn);
    return set;
  }
  /**
   * Estilo de aresta por TIPO de relação (cor + traço + animação). As relações DINÂMICAS de
   * dependência/dados (`connects` = tráfego app↔infra, `depends` = dependência de projeto) levam
   * o **fluxo neon animado** (pacotes indo origem→destino, classe `kt-flow`, glow na própria cor)
   * — é nelas que "passa dado". A **fundação** (`built-on`) é sólida e presente, com **glow
   * estático** (`kt-glow`), sem marcha. Nomes alternativos (depends_on/built_on/…) são
   * normalizados; sem match → DEFAULT.
   */
  const REL_ALIAS = { depends_on: "depends", built_on: "built-on", relates_to: "relates-to", links_to: "links-to", uses_tech: "uses" };
  const REL_STYLE = {
    "connects": { color: "#34d399", width: 1.7, opacity: .9, flow: true },
    "depends": { color: "#22d3ee", width: 1.7, opacity: .9, flow: true },
    "built-on": { color: "#c084fc", width: 2.0, opacity: .95, glow: true },
    "contains": { color: "#3b82f6", width: 1.5, opacity: .5 },
    "includes": { color: "#6366f1", width: 1.5, opacity: .6 },
    "serves": { color: "#f59e0b", width: 1.5, opacity: .55 },
    "served-by": { color: "#f59e0b", width: 1.4, opacity: .5, dash: "1 5" },
    "provided-by": { color: "#f43f5e", width: 1.5, opacity: .55 },
    "exposes": { color: "#10b981", width: 1.5, opacity: .55 },
    "manages": { color: "#a855f7", width: 1.5, opacity: .55 },
    "uses": { color: "#7c8aa0", width: 1.2, opacity: .35 },
    "documents": { color: "#64748b", width: 1.2, opacity: .4, dash: "2 4" },
    "relates-to": { color: "#94a3b8", width: 1.3, opacity: .45, dash: "2 6" },
    "links-to": { color: "#94a3b8", width: 1.3, opacity: .45, dash: "3 5" },
  };
  const DEFAULT_REL_STYLE = { color: "#64748b", width: 1.3, opacity: .45 };
  const relStyle = (rel) => REL_STYLE[REL_ALIAS[rel] || rel] || DEFAULT_REL_STYLE;
  /** Desenha o "web" de relações entre os nós em destaque, com estilo por tipo de relação. */
  function drawFlow(reach) {
    svg.innerHTML = ""; if (!reach) return;
    let n = 0;
    for (const e of edges) {
      if (n > 800) break;
      if (e.relation === "connects" && !depsOn) continue;
      if (!reach.has(e.source) || !reach.has(e.target)) continue;
      const a = pillOf.get(e.source), b = pillOf.get(e.target); if (!a || !b) continue;
      const pa = centerOf(a), pb = centerOf(b), my = (pa.y + pb.y) / 2;
      const st = relStyle(e.relation);
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M ${pa.x} ${pa.y} C ${pa.x} ${my}, ${pb.x} ${my}, ${pb.x} ${pb.y}`);
      path.setAttribute("fill", "none"); path.setAttribute("stroke", st.color); path.setAttribute("stroke-width", st.width); path.setAttribute("stroke-linecap", "round"); path.setAttribute("stroke-opacity", st.opacity);
      if (st.flow || st.glow) { path.style.color = st.color; path.setAttribute("class", st.flow ? "kt-flow" : "kt-glow"); }
      else if (st.dash) path.setAttribute("stroke-dasharray", st.dash);
      svg.appendChild(path); n++;
    }
  }

  // ---- seleção / card ----
  const card = document.getElementById("card"), cardTitle = document.getElementById("card-title"), cardBody = document.getElementById("card-body");
  let selected = null;
  function select(id) {
    selected = id; const node = id ? byId.get(id) : null;
    const reach = id ? reachableFrom(id) : null;
    document.body.classList.toggle("dimmed", !!id);
    for (const [nid, p] of pillOf) { p.classList.toggle("sel", nid === id); p.classList.toggle("hot", !!reach && nid !== id && reach.has(nid)); }
    drawFlow(reach);
    if (!id) { card.classList.remove("show"); return; }
    cardTitle.textContent = node.label;
    const grps = {};
    for (const nb of adj.get(id)) { const key = `${nb.dir === "out" ? "" : "← "}${relName(nb.rel)}`; (grps[key] ||= []).push(byId.get(nb.id)); }
    const cat = CATS[node.type] || {};
    let html = `<span class="badge" style="background:${cat.color || "#475569"}">${esc(bandName(node.type) || node.type)}</span>`;
    if (node.meta && node.meta.summary) html += `<div class="sum">${esc(tr(node.meta.summary))}</div>`;
    if (node.meta && node.meta.owner) html += `<div class="sum">${esc(L().owner)}: ${esc(node.meta.owner)}</div>`;
    if (node.meta && node.meta.monorepo) html += `<div class="sum">Monorepo: <span class="nxb">${esc(node.meta.monorepo.toUpperCase())}</span></div>`;
    if (node.meta && node.meta.kind) html += `<div class="sum">${node.meta.kind === "app" ? "Application" : node.meta.kind === "lib" ? "Library" : esc(node.meta.kind)}</div>`;
    for (const [k, list] of Object.entries(grps)) {
      html += `<div class="grp"><h3>${esc(k)} · ${list.length}</h3>`;
      for (const t of list.slice(0, 80)) html += `<div class="lk" data-go="${esc(t.id)}"><span class="sw" style="background:${color(t.type)}"></span><span>${esc(t.label)}</span></div>`;
      html += `</div>`;
    }
    cardBody.innerHTML = html; card.classList.add("show"); card.classList.remove("min"); document.getElementById("min").textContent = "–";
    const p = pillOf.get(id); if (p) p.scrollIntoView({ behavior: "smooth", block: "center" });
  }
  cardBody.addEventListener("click", (e) => { const go = e.target.closest("[data-go]"); if (go) select(go.getAttribute("data-go")); });
  { const pe = document.getElementById("profile"); if (pe) pe.addEventListener("click", (e) => { const c = e.target.closest(".chip.link[data-id]"); if (c) select(c.getAttribute("data-id")); }); }
  document.getElementById("hero").addEventListener("click", (e) => { if (e.target.closest("a")) return; const c = e.target.closest(".repo[data-id]"); if (c) select(c.getAttribute("data-id")); });
  document.getElementById("close").addEventListener("click", () => select(null));
  document.getElementById("min").addEventListener("click", () => { const m = card.classList.toggle("min"); document.getElementById("min").textContent = m ? "+" : "–"; });

  // ---- card arrastável ----
  const head = document.getElementById("card-head"); let drag = null;
  head.addEventListener("mousedown", (e) => { if (e.target.closest(".hbtn")) return; const r = card.getBoundingClientRect(); drag = { dx: e.clientX - r.left, dy: e.clientY - r.top }; card.style.top = r.top + "px"; card.style.left = r.left + "px"; card.style.right = "auto"; card.style.bottom = "auto"; head.classList.add("grabbing"); });
  addEventListener("mousemove", (e) => { if (!drag) return; card.style.left = Math.max(4, Math.min(innerWidth - 80, e.clientX - drag.dx)) + "px"; card.style.top = Math.max(4, Math.min(innerHeight - 44, e.clientY - drag.dy)) + "px"; });
  addEventListener("mouseup", () => { if (drag) { drag = null; head.classList.remove("grabbing"); } });

  // ---- busca ----
  function applySearch(q) {
    q = q.trim().toLowerCase();
    document.body.classList.toggle("dimmed", !!q || !!selected);
    let first = null;
    for (const [nid, p] of pillOf) {
      if (q) { const n = byId.get(nid), hay = [n.label, n.meta && n.meta.dir, n.meta && n.meta.repo].filter(Boolean).join(" ").toLowerCase(); const m = hay.includes(q); p.classList.toggle("hot", m); p.classList.remove("sel"); if (m && !first) first = p; }
      else { p.classList.remove("hot"); p.classList.remove("sel"); }
    }
    if (!q && !selected) document.body.classList.remove("dimmed");
    if (q) svg.innerHTML = "";
    if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
  }
  document.getElementById("search").addEventListener("input", (e) => { selected = null; card.classList.remove("show"); applySearch(e.target.value); });

  // ---- i18n + tema ----
  function renderChrome() {
    document.getElementById("search").placeholder = L().search;
    document.getElementById("hint").textContent = L().hint(DATA.nodes.length, edges.length);
    for (const t of present) { headRefs[t].name.textContent = bandName(t); headRefs[t].tag.textContent = bandTag(t); }
    for (const g of groupLabelRefs) g.el.textContent = groupName(g.key);
    if (headRefs.library && headRefs.library.hint) headRefs.library.hint.textContent = L().libHint;
    if (langTitleEl) langTitleEl.textContent = L().langs;
    { const eh = document.getElementById("ella-h"), ep = document.getElementById("ella-p"); if (eh && L().ella) eh.textContent = L().ella.h; if (ep && L().ella) ep.textContent = L().ella.p; }
    document.getElementById("deps").title = { pt: "Dependências (tracejadas)", en: "Dependencies (dashed)", es: "Dependencias (discontinuas)" }[lang] || "Dependencies";
    const ht = document.getElementById("hero-title"); if (ht) ht.textContent = L().repos;
    for (const r of heroPitchRefs) r.el.textContent = tr(r.src);
    renderProfile();
    renderHub();
    document.querySelectorAll("#lang button").forEach((b) => b.classList.toggle("on", b.dataset.lang === lang));
    document.documentElement.lang = lang === "pt" ? "pt-BR" : lang;
  }
  document.querySelectorAll("#lang button").forEach((b) => b.addEventListener("click", () => { lang = b.dataset.lang; store.set("kt-lang", lang); renderChrome(); if (selected) select(selected); }));

  function applyTheme(mode) { document.documentElement.classList.toggle("light", mode === "light"); document.getElementById("theme").innerHTML = mode === "light" ? ICON.sun : ICON.moon; store.set("kt-theme", mode); if (selected) drawFlow(reachableFrom(selected)); }
  document.getElementById("theme").addEventListener("click", () => applyTheme(document.documentElement.classList.contains("light") ? "dark" : "light"));
  document.getElementById("deps").addEventListener("click", () => { depsOn = !depsOn; store.set("kt-deps", depsOn ? "1" : "0"); document.getElementById("deps").classList.toggle("on", depsOn); if (selected) select(selected); });


  addEventListener("resize", () => { if (selected) drawFlow(reachableFrom(selected)); });
  document.getElementById("deps").innerHTML = ICON.deps;
  applyTheme(store.get("kt-theme", "light"));
  document.getElementById("deps").classList.toggle("on", depsOn);
  renderChrome();
})();
</script>
</body>
</html>
