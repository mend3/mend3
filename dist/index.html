 plataforma multi-tenant unificada, enquanto contribuo com analytics de inteligência de e-commerce enterprise. Me importo profundamente com arquitetura pragmática, fundações de dados limpas e fazer a IA ser genuinamente útil em produção — e adoro trocar ideias com quem está construindo nesse mesmo espaço.","en":"Hi, I'm Victor — a software engineer and platform architect with 15+ years building and operating scalable SaaS platforms, distributed systems, data-intensive applications, and AI-powered products across fintech, legaltech, e-commerce intelligence, and analytics. What I enjoy most is turning fragmented data, processes, and knowledge into systems that actually run a business — multi-tenant SaaS, integration ecosystems, workflow automation, large-scale data acquisition, AI-native products, and knowledge systems. Right now I'm leading the architecture of an AI-data-driven SaaS ecosystem on a unified multi-tenant platform, while contributing to enterprise e-commerce intelligence analytics. I care deeply about pragmatic architecture, clean data foundations, and making AI genuinely useful in production — and I'm always happy to trade ideas with people building in the same space.","es":"Hola, soy Victor — ingeniero de software y arquitecto de plataforma con más de 15 años construyendo y operando plataformas SaaS escalables, sistemas distribuidos, aplicaciones data-intensive y productos con IA en fintech, legaltech, inteligencia de e-commerce y analytics. Lo que más disfruto es convertir datos, procesos y conocimiento fragmentados en sistemas que realmente operan un negocio — SaaS multi-tenant, ecosistemas de integración, automatización de workflows, adquisición de datos a gran escala, productos AI-native y sistemas de conocimiento. Hoy lidero la arquitectura de un ecosistema SaaS AI-data-driven sobre una plataforma multi-tenant unificada, mientras contribuyo con analytics de inteligencia de e-commerce enterprise. Me importa profundamente la arquitectura pragmática, las bases de datos limpias y hacer que la IA sea genuinamente útil en producción — y siempre disfruto intercambiar ideas con quienes construyen en el mismo espacio."},"note":{"pt":"Este é o workspace que estou construindo agora — os projetos mapeados acima.","en":"This is the workspace I'm building right now — the projects mapped above.","es":"Este es el workspace que estoy construyendo ahora mismo — los proyectos mapeados arriba."},"expertise":[{"pt":"Arquitetura de Plataforma","en":"Platform Architecture","es":"Arquitectura de Plataforma"},{"pt":"SaaS Multi-Tenant","en":"Multi-Tenant SaaS","es":"SaaS Multi-Tenant"},{"pt":"Sistemas Distribuídos","en":"Distributed Systems","es":"Sistemas Distribuidos"},{"pt":"Plataformas de Dados","en":"Data Platforms","es":"Plataformas de Datos"},{"pt":"Ecossistemas de Integração","en":"Integration Ecosystems","es":"Ecosistemas de Integración"},{"pt":"Automação de Workflows","en":"Workflow Automation","es":"Automatización de Workflows"},{"pt":"Aplicações de IA & LLM","en":"AI & LLM Applications","es":"Aplicaciones de IA & LLM"},{"pt":"Sistemas Agênticos","en":"Agentic Systems","es":"Sistemas Agénticos"},{"pt":"RAG & Sistemas de Conhecimento","en":"RAG & Knowledge Systems","es":"RAG & Sistemas de Conocimiento"},{"pt":"Arquitetura Orientada a Eventos","en":"Event-Driven Architecture","es":"Arquitectura Orientada a Eventos"},{"pt":"Observabilidade & Confiabilidade","en":"Observability & Reliability","es":"Observabilidad & Confiabilidad"},{"pt":"Liderança de Engenharia","en":"Engineering Leadership","es":"Liderazgo de Ingeniería"}],"experience":[{"role":{"pt":"Fundador & Arquiteto de Plataforma","en":"Founder & Platform Architect","es":"Fundador & Arquitecto de Plataforma"},"org":"DevShell One","period":{"pt":"2023 – Atual","en":"2023 – Present","es":"2023 – Actualidad"},"current":true,"summary":{"pt":"Arquiteto e líder técnico de um ecossistema SaaS multi-tenant unificado — plano de controle de infraestrutura compartilhada, framework ode.js, Angular, MongoDB, AWS).","es":"Software de operaciones legales — gestión de casos, controles financieros, automatización de workflows y reportes operativos (Node.js, Angular, MongoDB, AWS)."}},{"role":{"pt":"Desenvolvedor Full Stack Java","en":"Java Full Stack Developer","es":"Desarrollador Full Stack Java"},"org":"Contalex","period":"2014 – 2017","summary":{"pt":"ERP SaaS para escritórios de contabilidade — gestão financeira, faturamento e pagamentos recorrentes e onboarding de clientes (Java, Spring, SQL Server, AngularJS, Azure).","en":"SaaS ERP for accounting firms — financial management, billing and recurring payments, and customer onboarding (Java, Spring, SQL Server, AngularJS, Azure).","es":"ERP SaaS para firmas contables — gestión financiera, facturación y pagos recurrentes y onboarding de clientes (Java, Spring, SQL Server, AngularJS, Azure)."}}],"skills":[{"group":{"pt":"Arquitetura & Liderança","en":"Architecture & Leadership","es":"Arquitectura & Liderazgo"},"items":["Platform Architecture","Software Architecture","Distributed Systems","Multi-Tenant SaaS","Systems Design","Solution Architecture","Engineering Strategy","Technical Leadership"]},{"group":{"pt":"IA & Dados","en":"AI & Data","es":"IA & Datos"},"items":["LLMs","Agentic Systems","RAG","Knowledge Systems","Data Engineering","Data Platforms","ETL","Vector Databases"]},{"group":{"pt":"Backend","en":"Backend","es":"Backend"},"items":["TypeScript","Node.js","Express","NestJS","Java","Spring","REST APIs","Microservices"]},{"group":{"pt":"Frontend","en":"Frontend","es":"Frontend"},"items":["React","Next.js","Angular"]},{"group":{"pt":"Bancos de Dados","en":"Databases","es":"Bases de Datos"},"items":["PostgreSQL","Redis","MongoDB","MySQL","ClickHouse","Qdrant","pgvector","BigQuery"]},{"group":{"pt":"Infraestrutura","en":"Infrastructure","es":"Infraestructura"},"items":["Docker","Kubernetes","AWS","GCP","CI/CD","GitHub Actions","Linux","Observability"]}],"openTo":[{"pt":"Principal / Staff Software Engineer","en":"Principal / Staff Software Engineer","es":"Principal / Staff Software Engineer"},{"pt":"Arquiteto de Plataforma / Software / Soluções","en":"Platform / Software / Solutions Architect","es":"Arquitecto de Plataforma / Software / Soluciones"},{"pt":"Arquiteto de Sistemas de IA","en":"AI Systems Architect","es":"Arquitecto de Sistemas de IA"},{"pt":"Arquiteto de Plataforma de Dados","en":"Data Platform Architect","es":"Arquitecto de Plataforma de Datos"},{"pt":"Gerente de Engenharia","en":"Engineering Manager","es":"Gerente de Ingeniería"},{"pt":"Head / Diretor de Engenharia","en":"Head / Director of Engineering","es":"Head / Director de Ingeniería"},{"pt":"CTO Fracionado","en":"Fractional CTO","es":"CTO Fraccional"}],"links":[{"label":"github.com/mend3","url":"https://github.com/mend3"},{"label":"linkedin.com/in/vicmendonca","url":"https://www.linkedin.com/in/vicmendonca/"}],"cv":{"tagline":{"pt":"Engenheiro de Software Principal · Arquiteto de Plataforma · Sistemas de IA, Plataformas de Dados & SaaS Multi-Tenant","en":"Principal Software Engineer · Platform Architect · AI Systems, Data Platforms & Multi-Tenant SaaS"},"email":"victor.mendonca@live.com","summary":{"pt":["Engenheiro de software, arquiteto de plataforma e líder técnico com <b>mais de 15 anos</b> projetando, construindo e operando as plataformas sobre as quais as empresas funcionam — SaaS multi-tenant, sistemas distribuídos, aquisição de dados em larga escala e produtos nativos de IA.","Um único fio conecta o trabalho em <b>fintech, legaltech, inteligência de varejo e comércio, e plataformas de uso intensivo de dados</b>: pegar dados, integrações e processos fragmentados e convertê-los em <b>inteligência operacional</b> — sistemas que o negócio de fato opera, não painéis que ele só olha. Fiz isso consolidando milhões de sinais de preço para marcas globais; faço de novo agora no DevShell One, onde muitos produtos compartilham uma só fundação.","Atuo em todo o arco — <b>defino a arquitetura e a estratégia e, então, escrevo o código que tira o risco das partes mais difíceis</b> — e trato decisões estruturais como decisões de negócio: cada uma ligada a custo, confiabilidade ou velocidade de entrega."],"en":["Software engineer, platform architect, and technical leader with <b>15+ years</b> designing, building, and operating the platforms that companies run on — multi-tenant SaaS, distributed systems, large-scale data acquisition, and AI-native products.","One thread connects the work across <b>fintech, legaltech, retail &amp; commerce intelligence, and data-intensive platforms</b>: taking fragmented data, integrations, and processes and turning them into <b>operational intelligence</b> — systems a business operates on, not dashboards it looks at. I did it consolidating millions of pricing signals for global brands; I'm doing it now in DevShell One, where many products share one foundation.","I operate across the full arc — <b>set the architecture and strategy, then write the code that de-risks the hardest parts</b> — and I treat structural decisions as business decisions: every one tied to cost, reliability, or speed-to-market."]},"domains":[{"k":{"pt":"SaaS multi-tenant","en":"Multi-tenant SaaS"},"v":{"pt":"Uma plataforma servindo muitos clientes e verticais — novos produtos entram como módulos, não como reescritas.","en":"One platform serving many customers and verticals — new products ship as modules, not rewrites."}},{"k":{"pt":"Aquisição de dados em escala","en":"Data acquisition at scale"},"v":{"pt":"Fornecimento confiável de dados externos quando a web resiste — a matéria-prima de qualquer inteligência.","en":"Reliable supply of external data when the web fights back — the raw material for any intelligence."}},{"k":{"pt":"Ecossistemas de integração","en":"Integration ecosystems"},"v":{"pt":"Muitos sistemas se comportando como um só, sobre um modelo de dados canônico — sem silos que se contradizem.","en":"Many systems made to behave as one, on a single canonical data model — no more silos that disagree."}},{"k":{"pt":"Sistemas de IA e agentes","en":"AI &amp; agentic systems"},"v":{"pt":"IA que entende a operação inteira e age sobre ela — decisões com contexto, trabalho feito por conversa.","en":"AI that understands the whole operation and can act on it — decisions made with context, work done by conversation."}},{"k":{"pt":"Inteligência operacional","en":"Operational intelligence"},"v":{"pt":"Sinais fragmentados convertidos em o-que-fazer-agora — preço, prateleira, performance, crescimento.","en":"Fragmented signals turned into what to do next — pricing, shelf, performance, growth."}},{"k":{"pt":"Confiabilidade e custo","en":"Reliability &amp; cost"},"v":{"pt":"Sistemas mais fáceis de operar do que de explicar — observáveis, resilientes e mais baratos ao longo do tempo.","en":"Systems easier to operate than to explain — observable, resilient, and cheaper to run over time."}}],"experienceDetail":{"DevShell One":{"built":{"pt":"uma plataforma única em que uma fundação compartilhada sustenta muitos produtos e verticais — em vez de reconstruir infraestrutura, dados e IA a cada um.","en":"a single platform where one shared foundation powers many products and verticals — instead of rebuilding infrastructure, data, and AI for each."},"problem":{"pt":"cada novo produto ou vertical normalmente significa recriar infraestrutura, integrações e IA do zero.","en":"every new product or vertical normally means re-creating infrastructure, integrations, and AI from scratch."},"impact":{"pt":"verticais agora entram como módulos sobre uma base comum, então o custo marginal do próximo produto, cliente ou mercado é decrescente — e a IA entende a operação inteira porque tudo vive em um só modelo de dados.","en":"verticals now ship as modules on a shared base, so the marginal cost of the next product, tenant, or market keeps falling — and the AI understands the whole operation because everything lives on one data model."},"bullets":[{"pt":"<b>Control plane compartilhado</b> — uma fundação sobre a qual todo produto roda: orquestração, bancos de dados compartilhados, infraestrutura de IA, busca vetorial e observabilidade.","en":"<b>Shared control plane</b> — one foundation every product runs on: orchestration, shared databases, AI infrastructure, vector search, and observability."},{"pt":"<b>Runtime de aplicações multi-tenant</b> — a camada em que uma vertical inteira vira módulo: conectores universais, CMS/page builder, automação de processos, agendamento, recrutamento, imobiliário e dashboards. Muitos produtos, um só código.","en":"<b>Multi-tenant application runtime</b> — the layer where a whole vertical becomes a module: universal connectors, content/CMS and page building, workflow automation, scheduling, recruitment, real estate, and dashboards. Many products, one codebase."},{"pt":"<b>Camada de aquisição de dados</b> — coleta resiliente em larga escala (crawling distribuído, automação de navegadores, gestão de proxies, anti-bot) que abastece o resto da plataforma.","en":"<b>Data acquisition layer</b> — resilient, large-scale collection (distributed crawling, browser automation, proxy management, anti-bot) that supplies the rest of the platform."},{"pt":"<b>Camada nativa de IA</b> — um assistente que entende o sistema inteiro: memória persistente, recuperação de conhecimento, workflows de agentes e execução de ferramentas, com dados e inferência podendo permanecer na infraestrutura do próprio cliente.","en":"<b>Native AI layer</b> — an assistant that understands the whole system: persistent memory, knowledge retrieval, agentic workflows, and tool execution, with data and inference able to stay on the company's own infrastructure."}],"note":{"pt":"Responsável por estratégia de produto, arquitetura de software, infraestrutura, sistemas de IA, plataformas de dados e padrões de engenharia.","en":"Ownership across product strategy, software architecture, infrastructure, AI systems, data platforms, and engineering standards."},"stack":"TypeScript · Node.js · Next.js · React · PostgreSQL · Redis · Kubernetes · local LLMs (Ollama) · vector search · event-driven architecture"},"Visualitics":{"built":{"pt":"o núcleo de integração e processamento de uma plataforma de inteligência de e-commerce que consolida dados de marketplaces, publicidade e analytics em uma única camada de decisão — entregue no fluxo de trabalho via aplicações web e uma extensão de navegador.","en":"the integration and processing core of a commerce-intelligence platform that consolidates marketplace, advertising, and analytics data into a single decision layer — surfaced in-workflow through web apps and a browser extension."},"problem":{"pt":"os dados de performance de um vendedor estão espalhados por uma dezena de marketplaces e redes de anúncios que nunca concordam.","en":"a seller's performance data is scattered across a dozen marketplaces and ad networks that never agree."},"impact":{"pt":"um só lugar para ver e agir sobre a operação inteira, com o insight entregue onde o trabalho já acontece.","en":"one place to see and act on the whole operation, with insight delivered where the work already happens."},"note":{"pt":"Responsável pela ingestão de múltiplas fontes, processamento distribuído, ETL e cálculo de KPIs em Mercado Livre, Shopee, Amazon SP-API, VTEX, NuvemShop, GA4, Meta Ads e Google Ads.","en":"Owned multi-source ingestion, distributed processing, ETL, and KPI computation across Mercado Livre, Shopee, Amazon SP-API, VTEX, NuvemShop, GA4, Meta Ads, and Google Ads."},"stack":"Node.js · TypeScript · Express · Prisma · Python · FastAPI · BigQuery · Redis · GCP · browser-extension architecture"},"Jusbrasil":{"built":{"pt":"a infraestrutura de acesso web e aquisição de dados em larga escala por trás das operações de inteligência da empresa — arquitetura de proxies e roteamento para recuperação rápida e confiável em escala.","en":"the large-scale web-access and data-acquisition infrastructure behind the company's intelligence operations — proxy and routing architecture for fast, dependable retrieval at scale."},"problem":{"pt":"aquisição de dados confiável fica cara e frágil conforme o volume e a pressão anti-bot crescem.","en":"reliable data acquisition gets expensive and brittle as volume and anti-bot pressure grow."},"impact":{"pt":"redução relevante de custo operacional com maior confiabilidade — e ferramentas internas que elevaram a produtividade de todo o time.","en":"materially lower operational spend with stronger reliability — and internal tooling that lifted the whole team's throughput."},"note":{"pt":"Confiabilidade, resiliência, observabilidade e developer experience como prioridades de primeira ordem.","en":"Reliability, resiliency, observability, and developer-experience work as first-class concerns."},"stack":"Node.js · TypeScript · Docker · Kubernetes · Redis · PostgreSQL · observability platforms"},"Stone":{"built":{"pt":"serviços de backend e integrações para processamento de pagamentos e adquirência de alto volume, em uma das maiores adquirentes da América Latina.","en":"backend services and integrations for high-volume payment processing and merchant acquiring at one of Latin America's largest acquirers."},"problem":{"pt":"movimentação de dinheiro não tolera indisponibilidade, perda de dados nem falha de conformidade — em escala.","en":"money movement tolerates no downtime, no data loss, and no compliance gaps — at scale."},"impact":{"pt":"fluxos financeiros confiáveis e de baixa latência que se sustentam sob restrições rígidas de confiabilidade e regulação.","en":"dependable, low-latency financial flows that hold under strict reliability and regulatory constraints."},"note":{"pt":"Sistemas distribuídos, integrações de pagamento e bancárias, e otimização de performance sob requisitos de nível fintech.","en":"Distributed systems, payment and banking integrations, and performance optimization under fintech-grade requirements."},"stack":"Node.js · TypeScript · distributed systems · cloud infrastructure"},"Ascential":{"built":{"pt":"a engenharia das plataformas de inteligência de comércio digital usadas por marcas globais — arquitetura, pipelines de dados, analytics e infraestrutura de nuvem para dados de varejo em larga escala.","en":"engineering for the digital commerce-intelligence platforms used by global consumer brands — architecture, data pipelines, analytics, and cloud infrastructure for large-scale retail data."},"problem":{"pt":"marcas globais não conseguem enxergar como realmente performam em milhares de prateleiras digitais.","en":"global brands can't see how they're really performing across thousands of digital shelves."},"impact":{"pt":"permitiu que essas marcas otimizassem preço, disponibilidade, visibilidade de busca, qualidade de conteúdo e performance na prateleira digital — e definiu o roadmap e os padrões de qualidade e operação por trás disso.","en":"enabled those brands to optimize pricing, availability, search visibility, content quality, and digital-shelf performance — and set the roadmap and the quality and operational standards behind it."},"note":{"pt":"Liderança de engenharia em analytics de varejo, conteúdo &amp; compliance e ferramentas de store locator.","en":"Engineering leadership across retail analytics, content &amp; compliance, and store-locator tooling."},"stack":"Distributed data platforms · analytics pipelines · cloud infrastructure","verb":{"pt":"Liderou","en":"Led"}},"Intellibrand":{"built":{"pt":"plataformas de inteligência de varejo em larga escala processando <b>milhões de sinais de preço, estoque e merchandising</b> em varejistas e marketplaces globais — como Tech Lead, dono da escalabilidade, ingestão de dados, inteligência de preços e analytics de prateleira digital.","en":"large-scale retail-intelligence platforms processing <b>millions of pricing, inventory, and merchandising signals</b> across global retailers and marketplaces — as Tech Lea     es: { t: { a: "Arquitectura de", b: "plataforma" }, sub: "El ecosistema SaaS multi-tenant que diseño y opero — productos, dominios y capacidades sobre una base de datos e IA. Haz clic en un nodo para explorar.", search: "Buscar…", owner: "Dueño", libHint: "Haz clic en una app para revelar sus bibliotecas.", langs: "Lenguajes", repos: "Repositorios", hint: (n, e) => `${n} nodos · ${e} relaciones`, profile: { experience: "Experiencia", skills: "Competencias", openTo: "Abierto a" }, ella: { h: "Conoce a Ella", p: "La IA del ecosistema — RAG, automatización y persona propia." },

  const byId = new Map(DATA.nodes.map((n) => [n.id, n]));
  // Normaliza um rótulo p/ matching: minúsculo + alias (sinônimos → forma canônica),

  const canon = (s) => { const k = String(s == null ? "" : s).toLowerCase().trim(); return ALIASES[k] || k; };
  // canon(label) → id de nó, p/ linkar chips do perfil ao grafo. Preferência: technology.
  const nodeByLabel = (() => {
    const m = new Map();
    for (const n of DATA.nodes) if (n.type === "technology") m.set(canon(n.label), n.id);
    for (const n of DATA.nodes) { const k = canon(n.label); if (!m.has(k)) m.set(k, n.id); }
    return m;
  })();

  const depAdj = new Map(DATA.nodes.map((n) => [n.id, []]));
  for (const e of edges) {
    if (e.relation === "connects") { depAdj.get(e.source).push(e.target); depAdj.get(e.target).push(e.source); continue; }
    adj.get(e.source).push({ id: e.target, rel: e.relation, dir: "out" }); adj.get(e.target).push({ id: e.source, rel: e.relation, dir: "in" });
  }
  let depsOn = store.get("kt-deps", "0") === "1";
  const color = (t) => (CATS[t] && CATS[t].color) || "#64748b";

  const bandTag = (t) => (L().band[t] && L().band[t][1]) || (CATS[t] && CATS[t].tagline) || "";
  const relName = (r) => (L().rel[r]) || r;
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  for (const type of present) {

  // ---- hero: catálogo de repositórios ----
  (function buildHero() {

    let h = `<div class="prof-top"><span class="prof-name">${esc(a.name)}</span>`;
    if (a.headline) h += `<span class="prof-headline">${esc(tr(a.headline))}</span>`;
    if (a.location) h += `<span class="prof-loc">${esc(tr(a.location))}</span>`;
    if (Array.isArray(a.links) && a.links.length) h += `<span class="prof-links">${a.links.map((l) => `<a href="${esc(l.url)}" target="_blank" rel="noopener">${linkIcon(l.url)}${esc(l.label || l.url)}</a>`).join("")}</span>`;
    h += `</div>`;
    if (a.summary) h += `<div class="prof-sum">${esc(tr(a.summary))}</div>`;
    if (a.expertise && a.expertise.length) h += chips(a.expertise, "accent");
    h += `<div class="prof-cols">`;
    if (a.experience && a.experience.length) {
      h += `<div class="prof-grp"><h4>${esc(lb.experience)}</h4><div class="exp">`;
      for (const e of a.experience) h += `<div class="exp-item${e.current ? " cur" : ""}"><div class="exp-h"><span class="exp-role">${esc(tr(e.role))}</span><span class="exp-org">— ${esc(tr(e.org))}</span><span class="exp-period">${esc(tr(e.period))}</span></div>${e.summary ? `<div class="exp-desc">${esc(tr(e.summary))}</div>` : ""}</div>`;
      h += `</div></div>`;
    }
    let right = "";
    if (Array.isArray(a.skills)) for (const grp of a.skills) right += `<div class="skillgrp"><h5>${esc(tr(grp.group))}</h5>${chips(grp.items)}</div>`;
    if (a.openTo && a.openTo.length) right += `<div class="skillgrp"><h5>${esc(lb.openTo)}</h5>${chips(a.openTo, "accent")}</div>`;
    if (right) h += `<div class="prof-grp"><h4>${esc(lb.skills)}</h4>${right}</div>`;
    h += `</div>`;
    el.innerHTML = h; el.style.display = "";
  }

  // ---- edges ----
  const svg = document.getElementById("edges"), stage = document.getElementById("stage");
  function centerOf(el) { const r = el.getBoundingClientRect(), s = stage.getBoundingClientRect(); return { x: r.left + r.width / 2 - s.left, y: r.top + r.height / 2 - s.top }; }
  const TERMINAL = new Set(["service", "library", "technology", "doc"]);
  /**
   * Relações de CONHECIMENTO (stack/docs): NÃO são arestas arquiteturais. Atravessá-las funde
   * o grafo num componente único — toda stack compartilhada (React/Node/Postgres) vira ponte
   * entre projetos sem relação. O destaque ao clicar as ignora.
   */
  /**
   * Arestas LATERAIS (dependência entre pares): NÃO descem na hierarquia. Um projeto alcançado
   * por `depends`/`connects` não é "aberto" (senão clicar num produto puxaria todos os serviços
   * do `oracle` do qual ele depende — o que fazia o `oracle` virar super-hub e iluminar a
   * plataforma toda). Só projetos alcançados PELA hierarquia (serves/contains a partir de
   * domínio/produto) revelam o próprio fluxo.
   */
  const LATERAL_REL = new Set(["depends", "connects"]);
  /**
   * Conjunto em destaque ao clicar: o nó + seus vizinhos DIRETOS (todas as relações — inclui as
   * tecnologias que ele usa) e, se for estrutural, o fluxo de SAÍDA dos PROJETOS alcançados PELA
   * HIERARQUIA. Tecnologias/serviços são terminais e nunca expandem, então a stack compartilhada
   * não vira ponte entre projetos. Terminal clicado mostra só relações diretas — ex.: clicar
   * numa tecnologia revela quem a usa.
   */
  function reachableFrom(id) {
    const node = byId.get(id), set = new Set([id]);
    for (const x of adj.get(id)) set.add(x.id);
    if (!TERMINAL.has(node.type)) for (const x of adj.get(id)) if (byId.get(x.id).type === "project" && !LATERAL_REL.has(x.rel)) for (const y of adj.get(x.id)) if (y.dir === "out") set.add(y.id);
    if (depsOn) for (const nid of [...set]) for (const dn of depAdj.get(nid) || []) set.add(dn);
    return set;
  }
  /**
   * Estilo de aresta por TIPO de relação (cor + traço + animação). As relações DINÂMICAS de
   * dependência/dados (`connects` = tráfego app↔infra, `depends` = dependência de projeto) levam
   * o **fluxo neon animado** (pacotes indo origem→destino, classe `kt-flow`, glow na própria cor)
   * — é nelas que "passa dado". A **fundação** (`built-on`) é sólida e presente, com **glow
   * estático** (`kt-glow`), sem marcha. Nomes alternativos (depends_on/built_on/…) são
   * normalizados; sem match → DEFAULT.
   */
  const REL_ALIAS = { depends_on: "depends", built_on: "built-on", relates_to: "relates-to", links_to: "links-to", uses_tech: "uses" };
  const REL_STYLE = {
    "connects": { color: "#34d399", width: 1.7, opacity: .9, flow: true },
    "depends": { color: "#22d3ee", width: 1.7, opacity: .9, flow: true },
    "built-on": { color: "#c084fc", width: 2.0, opacity: .95, glow: true },
    "contains": { color: "#3b82f6", width: 1.5, opacity: .5 },
    "includes": { color: "#6366f1", width: 1.5, opacity: .6 },
    "serves": { color: "#f59e0b", width: 1.5, opacity: .55 },
    "served-by": { color: "#f59e0b", width: 1.4, opacity: .5, dash: "1 5" },
    "provided-by": { color: "#f43f5e", width: 1.5, opacity: .55 },
    "exposes": { color: "#10b981", width: 1.5, opacity: .55 },
    "manages": { color: "#a855f7", width: 1.5, opacity: .55 },
    "uses": { color: "#7c8aa0", width: 1.2, opacity: .35 },
    "documents": { color: "#64748b", width: 1.2, opacity: .4, dash: "2 4" },
    "relates-to": { color: "#94a3b8", width: 1.3, opacity: .45, dash: "2 6" },
    "links-to": { color: "#94a3b8", width: 1.3, opacity: .45, dash: "3 5" },
  };
  const DEFAULT_REL_STYLE = { color: "#64748b", width: 1.3, opacity: .45 };
  const relStyle = (rel) => REL_STYLE[REL_ALIAS[rel] || rel] || DEFAULT_REL_STYLE;
  /** Desenha o "web" de relações entre os nós em destaque, com estilo por tipo de relação. */
  function drawFlow(reach) {
    svg.innerHTML = ""; if (!reach) return;
    let n = 0;
    for (const e of edges) {
      if (n > 800) break;
      if (e.relation === "connects" && !depsOn) continue;
      if (!reach.has(e.source) || !reach.has(e.target)) continue;
      const a = pillOf.get(e.source), b = pillOf.get(e.target); if (!a || !b) continue;
      const pa = centerOf(a), pb = centerOf(b), my = (pa.y + pb.y) / 2;
      const st = relStyle(e.relation);
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M ${pa.x} ${pa.y} C ${pa.x} ${my}, ${pb.x} ${my}, ${pb.x} ${pb.y}`);
      path.setAttribute("fill", "none"); path.setAttribute("stroke", st.color); path.setAttribute("stroke-width", st.width); path.setAttribute("stroke-linecap", "round"); path.setAttribute("stroke-opacity", st.opacity);
      if (st.flow || st.glow) { path.style.color = st.color; path.setAttribute("class", st.flow ? "kt-flow" : "kt-glow"); }
      else if (st.dash) path.setAttribute("stroke-dasharray", st.dash);
      svg.appendChild(path); n++;
    }
  }

  // ---- seleção / card ----
  const card = document.getElementById("card"), cardTitle = document.getElementById("card-title"), cardBody = document.getElementById("card-body");
  let selected = null;
  function select(id) {
    selected = id; const node = id ? byId.get(id) : null;
    const reach = id ? reachableFrom(id) : null;
    document.body.classList.toggle("dimmed", !!id);
    for (const [nid, p] of pillOf) { p.classList.toggle("sel", nid === id); p.classList.toggle("hot", !!reach && nid !== id && reach.has(nid)); }
    drawFlow(reach);
    if (!id) { card.classList.remove("show"); return; }
    cardTitle.textContent = node.label;
    const grps = {};
    for (const nb of adj.get(id)) { const key = `${nb.dir === "out" ? "" : "← "}${relName(nb.rel)}`; (grps[key] ||= []).push(byId.get(nb.id)); }
    const cat = CATS[node.type] || {};
    let html = `<span class="badge" style="background:${cat.color || "#475569"}">${esc(bandName(node.type) || node.type)}</span>`;
    if (node.meta && node.meta.summary) html += `<div class="sum">${esc(tr(node.meta.summary))}</div>`;
    if (node.meta && node.meta.owner) html += `<div class="sum">${esc(L().owner)}: ${esc(node.meta.owner)}</div>`;
    if (node.meta && node.meta.monorepo) html += `<div class="sum">Monorepo: <span class="nxb">${esc(node.meta.monorepo.toUpperCase())}</span></div>`;
    if (node.meta && node.meta.kind) html += `<div class="sum">${node.meta.kind === "app" ? "Application" : node.meta.kind === "lib" ? "Library" : esc(node.meta.kind)}</div>`;
    for (const [k, list] of Object.entries(grps)) {
      html += `<div class="grp"><h3>${esc(k)} · ${list.length}</h3>`;
      for (const t of list.slice(0, 80)) html += `<div class="lk" data-go="${esc(t.id)}"><span class="sw" style="background:${color(t.type)}"></span><span>${esc(t.label)}</span></div>`;
      html += `</div>`;
    }
    cardBody.innerHTML = html; card.classList.add("show"); card.classList.remove("min"); document.getElementById("min").textContent = "–";
    const p = pillOf.get(id); if (p) p.scrollIntoView({ behavior: "smooth", block: "center" });
  }
  cardBody.addEventListener("click", (e) => { const go = e.target.closest("[data-go]"); if (go) select(go.getAttribute("data-go")); });
  document.getElementById("profile").addEventListener("click", (e) => { const c = e.target.closest(".chip.link[data-id]"); if (c) select(c.getAttribute("data-id")); });
  document.getElementById("hero").addEventListener("click", (e) => { if (e.target.closest("a")) return; const c = e.target.closest(".repo[data-id]"); if (c) select(c.getAttribute("data-id")); });
  document.getElementById("close").addEventListener("click", () => select(null));
  document.getElementById("min").addEventListener("click", () => { const m = card.classList.toggle("min"); document.getElementById("min").textContent = m ? "+" : "–"; });

  // ---- card arrastável ----
  const head = document.getElementById("card-head"); let drag = null;
  head.addEventListener("mousedown", (e) => { if (e.target.closest(".hbtn")) return; const r = card.getBoundingClientRect(); drag = { dx: e.clientX - r.left, dy: e.clientY - r.top }; card.style.top = r.top + "px"; card.style.left = r.left + "px"; card.style.right = "auto"; card.style.bottom = "auto"; head.classList.add("grabbing"); });
  addEventListener("mousemove", (e) => { if (!drag) return; card.style.left = Math.max(4, Math.min(innerWidth - 80, e.clientX - drag.dx)) + "px"; card.style.top = Math.max(4, Math.min(innerHeight - 44, e.clientY - drag.dy)) + "px"; });
  addEventListener("mouseup", () => { if (drag) { drag = null; head.classList.remove("grabbing"); } });

  // ---- busca ----
  function applySearch(q) {
    q = q.trim().toLowerCase();
    document.body.classList.toggle("dimmed", !!q || !!selected);
    let first = null;
    for (const [nid, p] of pillOf) {
      if (q) { const n = byId.get(nid), hay = [n.label, n.meta && n.meta.dir, n.meta && n.meta.repo].filter(Boolean).join(" ").toLowerCase(); const m = hay.includes(q); p.classList.toggle("hot", m); p.classList.remove("sel"); if (m && !first) first = p; }
      else { p.classList.remove("hot"); p.classList.remove("sel"); }
    }
    if (!q && !selected) document.body.classList.remove("dimmed");
    if (q) svg.innerHTML = "";
    if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
  }
  document.getElementById("search").addEventListener("input", (e) => { selected = null; card.classList.remove("show"); applySearch(e.target.value); });

  // ---- i18n + tema ----
  function renderChrome() {
    document.getElementById("title").innerHTML = `${esc(L().t.a)} <span class="accent">${esc(L().t.b)}</span>`;
    document.getElementById("subtitle").textContent = L().sub;
    document.getElementById("search").placeholder = L().search;
    document.getElementById("hint").textContent = L().hint(DATA.nodes.length, edges.length);
    for (const t of present) { headRefs[t].name.textContent = bandName(t); headRefs[t].tag.textContent = bandTag(t); }
    for (const g of groupLabelRefs) g.el.textContent = groupName(g.key);
    if (headRefs.library && headRefs.library.hint) headRefs.library.hint.textContent = L().libHint;
    if (langTitleEl) langTitleEl.textContent = L().langs;
    { const eh = document.getElementById("ella-h"), ep = document.getElementById("ella-p"); if (eh && L().ella) eh.textContent = L().ella.h; if (ep && L().ella) ep.textContent = L().ella.p; }
    document.getElementById("deps").title = { pt: "Dependências (tracejadas)", en: "Dependencies (dashed)", es: "Dependencias (discontinuas)" }[lang] || "Dependencies";
    const ht = document.getElementById("hero-title"); if (ht) ht.textContent = L().repos;
    for (const r of heroPitchRefs) r.el.textContent = tr(r.src);
    renderProfile();
    document.querySelectorAll("#lang button").forEach((b) => b.classList.toggle("on", b.dataset.lang === lang));
    document.documentElement.lang = lang === "pt" ? "pt-BR" : lang;
  }
  document.querySelectorAll("#lang button").forEach((b) => b.addEventListener("click", () => { lang = b.dataset.lang; store.set("kt-lang", lang); renderChrome(); if (selected) select(selected); }));

  function applyTheme(mode) { document.documentElement.classList.toggle("light", mode === "light"); document.getElementById("theme").innerHTML = mode === "light" ? ICON.sun : ICON.moon; store.set("kt-theme", mode); if (selected) drawFlow(reachableFrom(selected)); }
  document.getElementById("theme").addEventListener("click", () => applyTheme(document.documentElement.classList.contains("light") ? "dark" : "light"));
  document.getElementById("deps").addEventListener("click", () => { depsOn = !depsOn; store.set("kt-deps", depsOn ? "1" : "0"); document.getElementById("deps").classList.toggle("on", depsOn); if (selected) select(selected); });


  addEventListener("resize", () => { if (selected) drawFlow(reachableFrom(selected)); });
  document.getElementById("deps").innerHTML = ICON.deps;
  applyTheme(store.get("kt-theme", "light"));
  document.getElementById("deps").classList.toggle("on", depsOn);
  renderChrome();
})();
</script>
</body>
</html>
